name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests=false

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t bulkhead-demo:latest .

  # Optional Deployment Step (example placeholder)
  deploy:
    name: Deploy (Optional)
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy Step
        run: echo "Add your deployment logic here (AWS / Azure / GCP / K8s)"
